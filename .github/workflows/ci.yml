name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          if command -v ruff &>/dev/null || pip show ruff &>/dev/null 2>&1; then
            ruff check zoyd/ tests/
          else
            python -m py_compile $(find zoyd tests -name "*.py")
          fi

      - name: Test
        run: pytest tests/ -v --tb=short -x --timeout=30 --ignore=tests/test_redis_integration.py --ignore=tests/test_vectors_integration.py --ignore=tests/test_session_integration.py
